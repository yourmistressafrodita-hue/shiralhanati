<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shir Alhanati — Web Designer</title>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,700&f[]=satoshi@400,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="grid-background"></div>
    
    <header class="header">
        <div class="logo">SHIR ALHANATI</div>
        <nav>
            <button id="langToggle" aria-label="Switch language">עב</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1 class="hero-title fade-in">
                <span data-en="I BUILD" data-he="אני מעצבת">I BUILD</span>
                <span class="italic" data-en="DIGITAL" data-he="חוויות">DIGITAL</span>
                <span data-en="EXPERIENCES" data-he="דיגיטליות">EXPERIENCES</span>
                <span class="italic" data-en="THAT MATTER" data-he="נועזות">THAT MATTER</span>
            </h1>
            <p class="hero-subtitle fade-in" data-en="Web designer & developer based in Prague. Focused on high-impact e-commerce & personal brands." data-he="מעצבת ומפתחת אתרים מפראג. מתמקדת באתרי איקומרס ומותגים אישיים בעלי אימפקט גבוה.">
                Web designer & developer based in Prague. Focused on high-impact e-commerce & personal brands.
            </p>
            <a href="#contact" class="btn fade-in" data-en="LET'S TALK" data-he="בואו נדבר">LET'S TALK</a>
        </section>
    </main>

    <script>
        const langBtn = document.getElementById('langToggle');
        let currentLang = 'en';
        
        langBtn.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'he' : 'en';
            document.documentElement.setAttribute('lang', currentLang);
            document.documentElement.setAttribute('dir', currentLang === 'he' ? 'rtl' : 'ltr');
            langBtn.textContent = currentLang === 'en' ? 'עב' : 'EN';
            
            document.querySelectorAll('[data-en]').forEach(el => {
                const text = el.getAttribute('data-' + currentLang);
                if (text) el.textContent = text;
            });
        });
    </script>
</body>
</html>
